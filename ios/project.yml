name: ShotStopper
options:
  bundleIdPrefix: com.kylejs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ShotStopper:
    type: application
    platform: iOS
    sources:
      - path: ShotStopper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kylejs.ShotStopper
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: X2TBSUCASC
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: ShotStopper/ShotStopper.entitlements
    info:
      path: ShotStopper/Info.plist
      properties:
        CFBundleName: ShotStopper
        CFBundleDisplayName: ShotStopper
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: "ShotStopper needs Bluetooth to connect to your shotStopper device and configure brew settings."
        NSBluetoothPeripheralUsageDescription: "ShotStopper uses Bluetooth to communicate with your shotStopper brewing device."

  ShotStopperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShotStopperTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ShotStopper
